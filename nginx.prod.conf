# HTTPS API proxy on port 8000
# 모바일 앱 및 외부 클라이언트가 https://jobchaja.com:8000 으로 백엔드에 직접 접근할 수 있도록 합니다.
# Allows mobile app and external clients to reach the backend directly via HTTPS on port 8000.
server {
    listen 8000 ssl;
    server_name jobchaja.com www.jobchaja.com;

    ssl_certificate     /etc/letsencrypt/live/jobchaja.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jobchaja.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # 최대 파일 업로드 크기 / Max upload size
    client_max_body_size 50m;

    location / {
        # CORS 설정: 모바일 앱 및 개발 환경 허용
        # CORS: allow mobile app dev and production origins
        set $cors_origin "";
        if ($http_origin ~* "^(https?://localhost(:[0-9]+)?|https://jobchaja\.com)$") {
            set $cors_origin $http_origin;
        }
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;

        # Preflight 요청 처리 / Handle preflight OPTIONS requests
        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://job-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
        # 백엔드가 http:// Location 헤더를 반환하면 https://로 재작성
        # Rewrite any http:// Location headers from backend to https://
        proxy_redirect http:// https://;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name jobchaja.com www.jobchaja.com;

    # Certbot ACME challenge (renewal 시 필요)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지 모든 요청을 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server block
server {
    listen 443 ssl;
    server_name jobchaja.com www.jobchaja.com;

    # Let's Encrypt SSL 인증서 경로
    ssl_certificate     /etc/letsencrypt/live/jobchaja.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jobchaja.com/privkey.pem;

    # SSL 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    # 파일 업로드용 백엔드 직접 프록시 (Next.js body 제한 우회)
    # Direct backend proxy for file uploads (bypasses Next.js body size limit)
    location /api-direct/ {
        client_max_body_size 50m;
        proxy_pass http://job-backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://job-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
