# Production docker-compose with SSL (HTTPS)
# 사용법: docker compose -f docker-compose.prod.yml up -d --build
#
# 사전 준비:
#   1. SSL 인증서 발급: sudo ./scripts/setup-ssl.sh
#   2. 백엔드가 같은 Docker 네트워크(app-network)에 있어야 합니다

services:
  frontend:
    build:
      context: .
      args:
        - NEXT_PUBLIC_API_URL=https://jobchaja.com
    container_name: job-frontend
    environment:
      - BACKEND_URL=http://job-backend:8000
      - NODE_ENV=production
    restart: always
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
      - "8000:8000"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
    restart: always
    networks:
      - app-network

networks:
  app-network:
    external: true
